<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Su Ürünleri Müzesi AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Yeni Oyun Sayfasına Giden Şık Buton */
      .oyun-butonu {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #2b6cb0;
        color: white;
        padding: 15px 30px;
        border-radius: 25px;
        font-size: 18px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: bold;
        text-decoration: none;
        z-index: 999;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kopekbaligiModel" src="kopekbaligi.glb"></a-asset-item>
        <a-asset-item id="palyacoModel" src="palyaco.glb"></a-asset-item>
        <a-asset-item id="mavitangModel" src="mavitang.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#kopekbaligiModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#palyacoModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model src="#mavitangModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

    </a-scene>

    <a href="oyun.html" class="oyun-butonu">🧩 Eşleştirme Oyunu</a>

  </body>
</html>
