<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Su Ürünleri Müzesi AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* Telefon ekranının altındaki şık panel */
      #quiz-panel {
        position: fixed;
        bottom: -350px; /* İlk başta ekranın altında gizli */
        left: 0;
        width: 100%;
        height: auto;
        background: rgba(255, 255, 255, 0.95);
        border-top-left-radius: 25px;
        border-top-right-radius: 25px;
        padding: 25px;
        box-sizing: border-box;
        transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        z-index: 999;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.2);
      }
      /* Panel görünür olduğunda tetiklenecek sınıf */
      #quiz-panel.active {
        bottom: 0;
      }
      h2 {
        margin-top: 0;
        color: #1a365d;
        font-size: 20px;
      }
      p {
        color: #4a5568;
        font-size: 15px;
      }
      .secenekler-kapsayici {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 15px;
      }
      .buton {
        background: #e2e8f0;
        color: #2d3748;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .buton:active {
        transform: scale(0.98);
      }
      /* Doğru ve Yanlış Cevap Renkleri */
      .dogru {
        background: #48bb78 !important;
        color: white !important;
      }
      .yanlis {
        background: #f56565 !important;
        color: white !important;
      }
    </style>

    <script>
      // Oyun Verileri (Her balık için soru ve anahtar-kilit eşleştirmesi)
      const oyunVerisi = [
        {
          soru: "Görseldeki kilit için doğru anahtarı seçin: Bu hangi balıktır?",
          secenekler: ["Balina", "Köpekbalığı", "Hamsi"],
          dogruCevap: "Köpekbalığı"
        },
        {
          soru: "Görseldeki kilit için doğru anahtarı seçin: Bu hangi balıktır?",
          secenekler: ["Alabalık", "Sazan", "Palyaçobalığı"],
          dogruCevap: "Palyaçobalığı"
        },
        {
          soru: "Görseldeki kilit için doğru anahtarı seçin: Bu hangi balıktır?",
          secenekler: ["Mavi Tang Balığı", "Kefal", "Levrek"],
          dogruCevap: "Mavi Tang Balığı"
        }
      ];

      // Balık kameraya gelince paneli açan fonksiyon
      function paneliAc(balikIndex) {
        const panel = document.getElementById("quiz-panel");
        const veri = oyunVerisi[balikIndex];
        
        // Paneli doldur
        document.getElementById("soru-metni").innerText = veri.soru;
        const kapsayici = document.getElementById("secenekler");
        kapsayici.innerHTML = ""; // Eski butonları temizle

        veri.secenekler.forEach(secenek => {
          const btn = document.createElement("button");
          btn.className = "buton";
          btn.innerText = secenek;
          btn.onclick = function() {
            if(secenek === veri.dogruCevap) {
              btn.classList.add("dogru");
              btn.innerText = "🔑 Anahtar Kilide Uydu! Doğru!";
              // Diğer butonları tıklanmaz yap
              disableButtons();
            } else {
              btn.classList.add("yanlis");
              btn.innerText = "🔒 Kilit Açılmadı! Yanlış Anahtar.";
            }
          };
          kapsayici.appendChild(btn);
        });

        panel.classList.add("active");
      }

      // Balık kameradan çıkınca paneli kapatan fonksiyon
      function paneliKapat() {
        document.getElementById("quiz-panel").classList.remove("active");
      }

      function disableButtons() {
        const btns = document.querySelectorAll(".buton");
        btns.forEach(b => b.disabled = true);
      }

      // MindAR için target algılama bileşeni
      AFRAME.registerComponent('target-kontrol', {
        schema: { index: {type: 'int'} },
        init: function () {
          this.el.addEventListener('targetFound', () => {
            paneliAc(this.data.index);
          });
          this.el.addEventListener('targetLost', () => {
            paneliKapat();
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="kopekbaligiModel" src="kopekbaligi.glb"></a-asset-item>
        <a-asset-item id="palyacoModel" src="palyaco.glb"></a-asset-item>
        <a-asset-item id="mavitangModel" src="mavitang.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" target-kontrol="index: 0">
        <a-gltf-model src="#kopekbaligiModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" target-kontrol="index: 1">
        <a-gltf-model src="#palyacoModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" target-kontrol="index: 2">
        <a-gltf-model src="#mavitangModel" position="0 0 0" scale="0.6 0.6 0.6" rotation="0 0 0"></a-gltf-model>
      </a-entity>

    </a-scene>

    <div id="quiz-panel">
      <h2>Su Ürünleri Müzesi - Keşif Oyunu</h2>
      <p id="soru-metni">Balık taranıyor...</p>
      <div id="secenekler" class="secenekler-kapsayici">
        </div>
    </div>

  </body>
</html>
